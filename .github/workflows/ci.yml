name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  native-matrix:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm contracts
      - run: pnpm build:cli
      - run: pnpm game -- validate --format json
      - run: pnpm build:native
      - run: pnpm test:cli
      - run: pnpm test:desktop
      - run: pnpm test:native
      - if: runner.os == 'Linux'
        run: pnpm build:packages

  wasm-equivalence:
    name: Native/WebAssembly equivalence
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:cli
      - run: tools/deps/bootstrap-emsdk.sh
      - run: pnpm test:wasm-equivalence
      - run: pnpm test:harness
      - run: pnpm test:cold-session
